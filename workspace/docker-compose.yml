version: '3.8'

services:
  planner-api:
    build: .
    ports:
      - "8081:8080"
    environment:
      # Server Configuration
      - PORT=8080
      - DOCS_DIR=/app/workspace-docs
      
      # Optional: Debug mode
      - DEBUG=${DEBUG:-false}
      
      # MCP Cache Configuration
      - MCP_CACHE_TTL_MINUTES=${MCP_CACHE_TTL_MINUTES:-10080}
    volumes:
      # Persist documents outside container (bind mount to sync with host)
      - ../workspace-docs:/app/workspace-docs
      # Mount local docs for development (optional)
      - ./test-docs:/app/test-docs:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s


networks:
  default:
    name: planner-network
