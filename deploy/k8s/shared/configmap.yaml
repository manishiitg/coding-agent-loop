apiVersion: v1
kind: ConfigMap
metadata:
  name: mcpagent-shared-config
  namespace: prod-mcpagent
  labels:
    app.kubernetes.io/name: mcpagent
    app.kubernetes.io/managed-by: script
data:
  GO_ENV: "production"
  # Primary Agent Configuration - Gemini only; default = Flash, user can pick Pro
  AGENT_PROVIDER: "vertex"
  AGENT_MODEL: "gemini-3-flash-preview"
  PROVIDER: "vertex"
  MODEL: "gemini-3-flash-preview"
  MAX_TURNS: "100"
  TOOL_EXECUTION_TIMEOUT: "15m"
  TRACING_PROVIDER: "langfuse"
  # Vertex/Gemini - two models; first is default
  VERTEX_PRIMARY_MODEL: "gemini-3-flash-preview"
  VERTEX_AVAILABLE_MODELS: "gemini-3-flash-preview,gemini-3-pro-preview"
  # LLM lock: per-provider; vertex locked (admin key), openrouter unlocked (user provides key)
  SUPPORTED_LLM_PROVIDERS: "vertex,openrouter"
  LLM_CONFIG_LOCKED: "vertex"
  # Default published LLMs (first = default). User selection is honored when locked if in this list.
  DEFAULT_PUBLISHED_LLMS: '[{"id":"default-gemini-flash","name":"Gemini 3 Flash Preview","provider":"vertex","model_id":"gemini-3-flash-preview"},{"id":"default-gemini-pro","name":"Gemini 3 Pro Preview","provider":"vertex","model_id":"gemini-3-pro-preview"}]'
  # MCP lock: users cannot add/edit/remove MCP servers; only use pre-configured servers from mcp_config.json
  MCP_CONFIG_LOCKED: "true"
  # Context editing (compact large tool outputs) - default in code is true when unset
  ENABLE_CONTEXT_EDITING: "false"
  # Large output threshold for context offloading - tool outputs larger than this are offloaded to filesystem
  # Default in library is 10000 tokens. Set to 50000 for larger outputs.
  LARGE_OUTPUT_THRESHOLD: "50000"
  # Workspace Configuration (agent calls workspace-api via in-cluster service)
  WORKSPACE_API_URL: "http://mcpagent-workspace-api-cs"
  WORKSPACE_ENABLE_GITHUB_SYNC: "false"
  WORKSPACE_ENABLE_SEMANTIC_SEARCH: "false"
  # Multi-User Authentication Mode
  # Set to "true" to require user registration/login
  # Set to "false" (default) for single-user mode (no login required)
  MULTI_USER_MODE: "true"
  # Default user ID for single-user mode (ignored when MULTI_USER_MODE=true)
  DEFAULT_USER_ID: "default"
  # Hardcoded users (format: user1:password1,user2:password2)
  # When set, registration is disabled and only these users can login
  # AUTH_USERS: "admin:changeme,user1:secret123"

  # --- Multi-Provider Authentication ---
  # Enabled auth providers (comma-separated): simple, cognito, supabase
  AUTH_PROVIDERS: "cognito"

  # AWS Cognito Configuration (for OAuth authentication)
  # These are public OAuth client values, not secrets
  COGNITO_USER_POOL_ID: "ap-south-1_YhXWOPgST"
  COGNITO_CLIENT_ID: "2gahrd23uppdrlil01naotmvme"
  COGNITO_DOMAIN: "mcpagent-auth.auth.ap-south-1.amazoncognito.com"
  AWS_REGION: "ap-south-1"
