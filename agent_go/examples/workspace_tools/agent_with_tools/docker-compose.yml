version: '3.8'

services:
  planner-api:
    image: manishiitg/workspace-api:latest
    ports:
      - "8083:8080"
    environment: 
      # Server Configuration
      - PORT=8080
      - DOCS_DIR=/app/workspace-docs
      
      # Semantic Search Configuration
      - WORKSPACE_ENABLE_SEMANTIC_SEARCH=false
      
      # Optional: Debug mode
      - DEBUG=${DEBUG:-false}
      
      # MCP Cache Configuration
      - MCP_CACHE_TTL_MINUTES=${MCP_CACHE_TTL_MINUTES:-10080}
    volumes:
      - ../../../../examples/workspace-outputs:/app/workspace-docs
      # Mount local docs for development (optional)
      - ./test-docs:/app/test-docs:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s


networks:
  default:
    name: planner-network
