apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mcpagent-workspace-api-cs
  namespace: prod-mcpagent
  labels:
    app.kubernetes.io/name: cs
    app.kubernetes.io/instance: mcpagent-workspace-api
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/managed-by: script
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: 'letsencrypt-prod'
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/auth-type: basic
    nginx.ingress.kubernetes.io/auth-secret: basic-auth
    nginx.ingress.kubernetes.io/auth-realm: "Authentication Required"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - analytics-agent.citymall.live
      secretName: analytics-agent-tls
  rules:
    - host: analytics-agent.citymall.live
      http:
        paths:
          - path: /workspace(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: mcpagent-workspace-api-cs
                port:
                  number: 80
