services:
  # Workspace File Management API
  workspace-api:
    build:
      context: ./workspace
      dockerfile: Dockerfile
    # Required capabilities for mount namespace isolation
    cap_add:
      - SYS_ADMIN  # Needed for unshare -m and mount operations

    security_opt:
      - apparmor:unconfined  # Allow mount operations in namespace
    ports:
      - "8081:8080"
    env_file:
      - ./workspace/.env
    environment:
      # Server Configuration
      - PORT=8080
      - DOCS_DIR=/app/workspace-docs

      # OpenAI Configuration
      - OPENAI_API_KEY=${OPENAI_API_KEY:-your_openai_api_key_here}

      # Optional: Debug mode
      - DEBUG=${DEBUG:-false}

      # MCP Cache Configuration
      - MCP_CACHE_TTL_MINUTES=${MCP_CACHE_TTL_MINUTES:-10080}
      - WORKSPACE_ENABLE_GITHUB_SYNC=${WORKSPACE_ENABLE_GITHUB_SYNC:-true}
      - GOOGLE_WORKSPACE_CLI_CREDENTIALS_FILE=/app/gws-credentials.json
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./workspace-docs:/app/workspace-docs
      - ./agent_go/gws-credentials.json:/app/gws-credentials.json:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/package.json:/app/package.json
      - ./frontend/package-lock.json:/app/package-lock.json
      - ./frontend/vite.config.ts:/app/vite.config.ts
      - ./frontend/tsconfig.json:/app/tsconfig.json
      - ./frontend/tailwind.config.js:/app/tailwind.config.js
      - ./frontend/postcss.config.js:/app/postcss.config.js
      - ./frontend/components.json:/app/components.json
      - ./frontend/index.html:/app/index.html
      - ./agent_go/schemas:/agent_go/schemas:ro
      # Mount entire frontend directory for development
      - ./frontend:/app/frontend:ro
    environment:
      - NODE_ENV=development
      - VITE_API_BASE_URL=http://localhost:8000
      - VITE_WORKSPACE_API_URL=http://localhost:8081
    depends_on:
      workspace-api:
        condition: service_healthy
    restart: unless-stopped

  # Agent Server (opt-in: use --profile full)
  agent-server:
    build:
      context: .
      dockerfile: agent_go/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./agent_go/.env
    environment:
      # Override workspace URL for Docker networking (workspace-api listens on 8080 internally)
      - WORKSPACE_API_URL=http://workspace-api:8080
      # Absolute path to workspace-docs inside the container (mounted volume)
      - WORKSPACE_DOCS_PATH=/app/workspace-docs
      - LOCAL_MODE=true
      - TOOL_EXECUTION_TIMEOUT=15m
      - MCP_CACHE_TTL_MINUTES=10080
      - ENABLE_CONTEXT_SUMMARIZATION=true
      - TOKEN_THRESHOLD_PERCENT=0.7
      - FIXED_TOKEN_THRESHOLD=200000
      - SUMMARY_KEEP_LAST_MESSAGES=4
      - LARGE_OUTPUT_THRESHOLD=50000
      - WORKSPACE_ENABLE_GITHUB_SYNC=true
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - agent_data:/app/data
      - ./agent_go/configs:/app/configs
      - ./workspace-docs:/app/workspace-docs
      - ./agent_go/logs:/app/logs
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      workspace-api:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - full

volumes:
  ollama_data:
  workspace-docs:
  agent_data:
