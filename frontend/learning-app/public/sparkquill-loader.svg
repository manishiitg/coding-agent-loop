<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" role="img" aria-labelledby="loader-title loader-description">
  <title id="loader-title">SparkQuill is thinking</title>
  <desc id="loader-description">An animated quill writes a curved line and creates a yellow spark.</desc>
  <style>
    .quill {
      transform-box: fill-box;
      transform-origin: 35% 78%;
      animation: quill-float 2.4s cubic-bezier(.4, 0, .2, 1) infinite;
    }

    .writing-line {
      stroke-dasharray: 1;
      stroke-dashoffset: 1;
      animation: write-line 2.4s cubic-bezier(.45, 0, .2, 1) infinite;
    }

    .spark {
      transform-box: fill-box;
      transform-origin: center;
      animation: spark-arrive 2.4s cubic-bezier(.34, 1.56, .64, 1) infinite;
    }

    .ink-dot {
      transform-box: fill-box;
      transform-origin: center;
      animation: ink-pulse 2.4s ease-in-out infinite;
    }

    @keyframes quill-float {
      0%, 100% { transform: translate(0, 2px) rotate(-1deg); }
      42% { transform: translate(4px, -3px) rotate(2deg); }
      72% { transform: translate(1px, 0) rotate(0deg); }
    }

    @keyframes write-line {
      0%, 8% { stroke-dashoffset: 1; opacity: 0; }
      18% { opacity: 1; }
      58%, 78% { stroke-dashoffset: 0; opacity: 1; }
      100% { stroke-dashoffset: 0; opacity: 0; }
    }

    @keyframes spark-arrive {
      0%, 38% { opacity: .2; transform: scale(.55) rotate(-18deg); }
      58% { opacity: 1; transform: scale(1.12) rotate(4deg); }
      72% { opacity: 1; transform: scale(1) rotate(0deg); }
      100% { opacity: .2; transform: scale(.72) rotate(12deg); }
    }

    @keyframes ink-pulse {
      0%, 100% { opacity: .45; transform: scale(.78); }
      18%, 62% { opacity: 1; transform: scale(1); }
    }

    @media (prefers-reduced-motion: reduce) {
      .quill, .writing-line, .spark, .ink-dot { animation: none; }
      .writing-line { stroke-dashoffset: 0; opacity: 1; }
      .spark, .ink-dot { opacity: 1; }
    }
  </style>

  <g class="quill" fill="#0B1D42">
    <path d="M59 163C69 116 98 70 158 43c-2 36-22 66-60 86-13 7-24 14-33 23-3 4-5 7-6 11Z"/>
    <path d="M68 151c20-12 40-28 61-50-11 25-28 48-55 64l-6-14Z"/>
    <path d="M91 129c18-13 34-29 47-47-7 19-19 37-37 52l-10-5Z" fill="#FFFDF8"/>
    <path d="M58 164c23-31 49-59 78-84-26 29-49 59-69 91l-9-7Z"/>
  </g>

  <path class="writing-line" pathLength="1" d="M58 170c31 10 72 10 108-5 12-5 9-12-4-13-20-2-42 4-59 13" fill="none" stroke="#0B1D42" stroke-width="7" stroke-linecap="round"/>

  <circle class="ink-dot" cx="44" cy="167" r="7" fill="#FF6F61"/>

  <path class="spark" d="M174 26c3 14 9 20 23 23-14 3-20 9-23 23-3-14-9-20-23-23 14-3 20-9 23-23Z" fill="#FFC91B"/>
</svg>
