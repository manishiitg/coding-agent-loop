name: Desktop Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build Agent Server (arm64)
        run: |
          cd agent_go
          GOOS=darwin GOARCH=arm64 go build -o ../desktop/resources/agent-server ./cmd/server

      - name: Build Workspace Server (arm64)
        run: |
          cd workspace
          GOOS=darwin GOARCH=arm64 go build -o ../desktop/resources/workspace-server .

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: desktop/package-lock.json

      - name: Install dependencies
        run: |
          cd desktop
          npm ci

      - name: Build (Dry Run)
        if: github.event_name == 'workflow_dispatch'
        run: |
          cd desktop
          npm run build -- --arm64

      - name: Build & Publish Release
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          cd desktop
          npm run dist -- --arm64 --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
