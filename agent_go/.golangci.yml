# golangci-lint configuration for agent_go
# Best practices configuration focusing on real bug detection
# See https://golangci-lint.run/docs/configuration/ for full options

version: "2"

run:
  timeout: 5m
  build-tags:
    - integration

linters:
  # Start with no linters, explicitly enable what we need
  default: none

  enable:
    # Critical - catches real bugs
    - govet          # Reports suspicious constructs
    - ineffassign    # Detects ineffectual assignments

    # Important - code quality
    - errorlint      # Error wrapping issues
    - unused         # Unused code

    # Minor but useful
    - misspell       # Spelling mistakes

    # Disabled due to large number of existing issues (can enable incrementally later):
    # - staticcheck    # Industry standard static analysis (170 issues)
    # - errcheck       # Unchecked errors (170 issues)

  settings:
    govet:
      enable-all: true
      disable:
        - fieldalignment  # Too noisy, micro-optimization
        - shadow          # Can be noisy, enable later if needed

    errcheck:
      # Don't require checking errors from these functions
      exclude-functions:
        - (io.Closer).Close
        - (net/http.ResponseWriter).Write
        - (*os.File).Close
        - (io.ReadCloser).Close
        - (*bufio.Writer).Flush
      # Check type assertions
      check-type-assertions: false
      # Check blank identifier assignments
      check-blank: false

    staticcheck:
      checks:
        - "all"
        - "-SA1019"  # Disable deprecation warnings (can be noisy)
        - "-SA4006"  # Disable "value not used" (covered by ineffassign)
        - "-SA9003"  # Disable empty branch warnings (often intentional)
        - "-ST1005"  # Disable error string capitalization (style preference)
        - "-ST1003"  # Disable naming convention warnings
        - "-ST1023"  # Disable type inference suggestions (style preference)
        - "-S1039"   # Disable unnecessary fmt.Sprintf (often for consistency)
        - "-QF1003"  # Disable tagged switch suggestions (style preference)
        - "-QF1008"  # Disable embedded field selector suggestions
        - "-S1009"   # Disable nil check suggestions (explicit is clearer)
        - "-SA4010"  # Disable "result of append never used" (often intentional)

    errorlint:
      # Check for plain type assertions of errors
      asserts: true
      # Check for plain comparison of errors
      comparison: true
      # Suggest using %w for error wrapping
      errorf: true
      errorf-multi: true

    misspell:
      locale: US

  exclusions:
    # Exclude generated files
    generated: strict

    # Exclude certain paths
    paths:
      - vendor
      - cache
      - bin
      - tool_output_folder
      - tool_output
      - schema-gen
      - cmd/timeout/timeout-bin
      - ".*\\.pb\\.go$"
      - ".*_generated\\.go$"

    rules:
      # Relaxed rules for test files
      - path: _test\.go
        linters:
          - errcheck
          - govet
          - errorlint

      # Exclude common false positives for errcheck
      - text: "Error return value of .((os\\.)?std(out|err)\\..*|.*Close|.*Flush|os\\.Remove(All)?|.*print(f|ln)?|os\\.(Un)?Setenv). is not checked"
        linters:
          - errcheck

issues:
  # Show all issues
  max-issues-per-linter: 0
  max-same-issues: 0
