server {
    listen 80;
    server_name _;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;
    gzip_vary on;

    # Frontend: serve static files
    root /opt/frontend;
    index index.html;

    # Health endpoint
    location = /health {
        access_log off;
        default_type application/json;
        return 200 '{"status":"healthy","service":"nginx"}';
    }

    # Agent API: reverse proxy to localhost:8000
    # Matches /api and /api/*
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;

        # SSE / streaming support
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;

        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Long timeout for streaming responses
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Workspace API: reverse proxy to localhost:8080, strip /workspace-api prefix
    location /workspace-api/ {
        rewrite ^/workspace-api(/.*)$ $1 break;
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;

        # SSE / streaming support
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;

        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # SPA fallback: any request not matching a file routes to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Asset caching: Vite content-hashed assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
