name: Desktop DMG

on:
  push:
    branches:
      - '**'
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: desktop-dmg-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  commit-artifact:
    if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
    runs-on: macos-15-intel
    permissions:
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: |
            frontend/package-lock.json
            desktop/package-lock.json

      - name: Build Frontend Static Assets
        run: |
          set -euo pipefail
          cd frontend
          npm ci
          npm run build

      - name: Copy Frontend Into Agent Static Directory
        run: |
          set -euo pipefail
          rm -rf agent_go/static
          mkdir -p agent_go/static
          cp -R frontend/dist/. agent_go/static/

      - name: Use Released Go Module Dependencies
        run: |
          set -euo pipefail
          cd agent_go
          go mod edit -dropreplace=github.com/manishiitg/mcpagent
          go mod edit -dropreplace=github.com/manishiitg/multi-llm-provider-go
          go mod download

      - name: Build Agent Server (arm64)
        run: |
          set -euo pipefail
          cd agent_go
          GOOS=darwin GOARCH=arm64 go build -o ../desktop/resources/agent-server .

      - name: Build Workspace Server (arm64)
        run: |
          set -euo pipefail
          cd workspace
          go mod download
          GOOS=darwin GOARCH=arm64 go build -o ../desktop/resources/workspace-server .

      - name: Install Desktop Dependencies
        run: |
          set -euo pipefail
          cd desktop
          npm ci

      - name: Build Commit Artifact
        run: |
          set -euo pipefail
          cd desktop
          npx electron-builder --mac --arm64 --publish never

      - name: Upload DMG Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AgentForge-${{ github.run_number }}-${{ github.sha }}-mac-arm64
          path: |
            desktop/dist/*.dmg
            desktop/dist/*.zip
          if-no-files-found: error
          retention-days: 14

  release:
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}
    runs-on: macos-15-intel
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: |
            frontend/package-lock.json
            desktop/package-lock.json

      - name: Build Frontend Static Assets
        run: |
          set -euo pipefail
          cd frontend
          npm ci
          npm run build

      - name: Copy Frontend Into Agent Static Directory
        run: |
          set -euo pipefail
          rm -rf agent_go/static
          mkdir -p agent_go/static
          cp -R frontend/dist/. agent_go/static/

      - name: Use Released Go Module Dependencies
        run: |
          set -euo pipefail
          cd agent_go
          go mod edit -dropreplace=github.com/manishiitg/mcpagent
          go mod edit -dropreplace=github.com/manishiitg/multi-llm-provider-go
          go mod download

      - name: Build Agent Server (arm64)
        run: |
          set -euo pipefail
          cd agent_go
          GOOS=darwin GOARCH=arm64 go build -o ../desktop/resources/agent-server .

      - name: Build Workspace Server (arm64)
        run: |
          set -euo pipefail
          cd workspace
          go mod download
          GOOS=darwin GOARCH=arm64 go build -o ../desktop/resources/workspace-server .

      - name: Install Desktop Dependencies
        run: |
          set -euo pipefail
          cd desktop
          npm ci

      - name: Build & Publish Release
        run: |
          set -euo pipefail
          cd desktop
          # Sync package.json version with git tag (strip 'v' prefix)
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "Syncing package.json version to $VERSION"
          npm version $VERSION --no-git-tag-version
          
          npm run dist -- --arm64 --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
