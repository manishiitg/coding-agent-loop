# Production override: full stack with prod frontend (no hot reload).
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up --build
#
# - agent: MCP Agent (port 8000), env from ./agent_go/.env.
# - workspace-api: from base compose (env: ./workspace/.env).
# - frontend: uses Dockerfile.prod (build + nginx), no source volumes, no dev server.

services:
  agent:
    build:
      context: ./agent_go
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./agent_go/.env
    environment:
      - PORT=8000
      - WORKSPACE_API_URL=http://workspace-api:8080
    depends_on:
      workspace-api:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        # Set at build time so Vite bakes these into the bundle (override for your deployment)
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
        VITE_WORKSPACE_API_URL: ${VITE_WORKSPACE_API_URL:-http://localhost:8081}
    ports:
      - "5173:80"
    environment:
      - NODE_ENV=production
    volumes: []  # No source mounts: no hot reload, serving built static files only
    depends_on:
      workspace-api:
        condition: service_healthy
      agent:
        condition: service_started
    restart: unless-stopped
