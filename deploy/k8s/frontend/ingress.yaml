apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mcpagent-frontend-cs
  namespace: prod-mcpagent
  labels:
    app.kubernetes.io/name: cs
    app.kubernetes.io/instance: mcpagent-frontend
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/managed-by: script
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: 'letsencrypt-prod'
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    # Basic auth removed - using Cognito OAuth for authentication
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - analytics-agent.citymall.live
      secretName: analytics-agent-tls
  rules:
    - host: analytics-agent.citymall.live
      http:
        paths:
          # API traffic goes to agent service (must be before /)
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: mcpagent-agent-cs
                port:
                  number: 80
          # All other traffic goes to frontend
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mcpagent-frontend-cs
                port:
                  number: 80
