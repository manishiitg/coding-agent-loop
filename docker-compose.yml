  # Qdrant Vector Database
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__HTTP_PORT=6333
      - QDRANT__SERVICE__GRPC_PORT=6334
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Workspace File Management API
  workspace-api:
    build:
      context: ./workspace
      dockerfile: Dockerfile
    ports:
      - "8081:8080"
    env_file:
      - ./workspace/.env
    environment:
      # Server Configuration
      - PORT=8080
      - DOCS_DIR=/app/workspace-docs
      
      # Qdrant Configuration
      - QDRANT_URL=http://qdrant:6333
      
      # OpenAI Configuration
      - OPENAI_API_KEY=${OPENAI_API_KEY:-your_openai_api_key_here}
      - OPENAI_EMBEDDING_MODEL=text-embedding-3-small
      
      # Optional: Debug mode
      - DEBUG=${DEBUG:-false}
      
      # MCP Cache Configuration
      - MCP_CACHE_TTL_MINUTES=${MCP_CACHE_TTL_MINUTES:-10080}
    volumes:
      - ./workspace-docs:/app/workspace-docs
      - workspace_data:/app/data
    depends_on:
      - qdrant
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/package.json:/app/package.json
      - ./frontend/package-lock.json:/app/package-lock.json
      - ./frontend/vite.config.ts:/app/vite.config.ts
      - ./frontend/tsconfig.json:/app/tsconfig.json
      - ./frontend/tailwind.config.js:/app/tailwind.config.js
      - ./frontend/postcss.config.js:/app/postcss.config.js
      - ./frontend/components.json:/app/components.json
      - ./frontend/index.html:/app/index.html
      - ./agent_go/schemas:/agent_go/schemas:ro
      # Mount entire frontend directory for development
      - ./frontend:/app/frontend:ro
    environment:
      - NODE_ENV=development
      - VITE_API_BASE_URL=http://localhost:8000
      - VITE_WORKSPACE_API_URL=http://localhost:8081
    depends_on:
      workspace-api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  ollama_data:
  # neo4j_data: # Removed - using cloud AuraDB instead
  # neo4j_logs: # Removed - using cloud AuraDB instead
  agent_logs:
  workspace-docs:
  workspace_data:
  qdrant_data:
