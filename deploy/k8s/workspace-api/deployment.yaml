apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcpagent-workspace-api-cs
  namespace: prod-mcpagent
  labels:
    app.kubernetes.io/name: cs
    app.kubernetes.io/instance: mcpagent-workspace-api
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/managed-by: script
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: cs
      app.kubernetes.io/instance: mcpagent-workspace-api
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cs
        app.kubernetes.io/instance: mcpagent-workspace-api
    spec:
      terminationGracePeriodSeconds: 60
      serviceAccountName: default
      securityContext:
        {}
      containers:
        - name: workspace-api
          securityContext:
            capabilities:
              add: ["SYS_ADMIN"]
            allowPrivilegeEscalation: false
          image: 414085459896.dkr.ecr.ap-south-1.amazonaws.com/mcpagent-workspace-api:latest
          imagePullPolicy: Always
          command: ["./planner"]
          args: ["server", "--port", "8080", "--docs-dir", "/app/workspace-docs"]
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: mcpagent-shared-config
            - secretRef:
                name: prod-mcpagent-secret
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "1"
              memory: "2Gi"
          volumeMounts:
            - name: workspace-docs
              mountPath: /app/workspace-docs
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: workspace-docs
          persistentVolumeClaim:
            claimName: workspace-docs-pvc
      nodeSelector:
        karpenter.sh/nodepool: app-services-ondemand
      tolerations:
        - effect: NoSchedule
          key: app-services-ondemand
          operator: Exists
