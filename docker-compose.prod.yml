# Production override: full stack with prod frontend (no hot reload).
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up --build
#
# - agent: MCP Agent (port 8000), env from ./agent_go/.env.
# - workspace-api: from base compose (env: ./workspace/.env).
# - frontend: uses Dockerfile.prod (build + nginx), no source volumes, no dev server.

services:
  agent:
    build:
      context: ./agent_go
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./agent_go/.env
    environment:
      - PORT=8000
      - WORKSPACE_API_URL=http://workspace-api:8080
      # Absolute path to workspace-docs inside the container
      - WORKSPACE_DOCS_PATH=/app/workspace-docs
      # Host-side absolute path of workspace-docs — passed to `docker run -v` for
      # per-project containers (bind-mount always takes the host path, not the
      # container-internal path).
      - WORKSPACE_DOCS_HOST_PATH=${WORKSPACE_DOCS_HOST_PATH:-/app/workspace-docs-host}
      # Docker network so project containers can reach workspace-api by name.
      - DOCKER_NETWORK=${COMPOSE_PROJECT_NAME:-mcp-agent-builder-go}_default
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock  # DooD: manage sibling project containers
      - ${WORKSPACE_DOCS_HOST_PATH:-./workspace-docs}:/app/workspace-docs-host:ro  # host path reference
    depends_on:
      workspace-api:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        # Set at build time so Vite bakes these into the bundle (override for your deployment)
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
        VITE_WORKSPACE_API_URL: ${VITE_WORKSPACE_API_URL:-http://localhost:8081}
    ports:
      - "5173:80"
    environment:
      - NODE_ENV=production
    volumes: []  # No source mounts: no hot reload, serving built static files only
    depends_on:
      workspace-api:
        condition: service_healthy
      agent:
        condition: service_started
    restart: unless-stopped
