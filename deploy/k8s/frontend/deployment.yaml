apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcpagent-frontend-cs
  namespace: prod-mcpagent
  labels:
    app.kubernetes.io/name: cs
    app.kubernetes.io/instance: mcpagent-frontend
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/managed-by: script
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: cs
      app.kubernetes.io/instance: mcpagent-frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cs
        app.kubernetes.io/instance: mcpagent-frontend
    spec:
      terminationGracePeriodSeconds: 30
      serviceAccountName: default
      securityContext:
        {}
      containers:
        - name: frontend
          securityContext:
            {}
          image: 414085459896.dkr.ecr.ap-south-1.amazonaws.com/mcpagent-frontend:latest
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: mcpagent-shared-config
          ports:
            - containerPort: 80
              name: http
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "250m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
      nodeSelector:
        karpenter.sh/nodepool: app-services-ondemand
      tolerations:
        - effect: NoSchedule
          key: app-services-ondemand
          operator: Exists
